<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creatify AI — Free Tool</title>  <script src="https://telegram.org/js/telegram-web-app.js"></script>  <!-- Premium font -->  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">  <style>
    :root {
      --bg: #0b0d12;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --text: #ffffff;
      --muted: #a1a1aa;
      --accent: linear-gradient(135deg, #7c3aed, #22d3ee);
      --accent-soft: rgba(124,58,237,0.18);
    }

    * {
      box-sizing: border-box;
      font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1000px 500px at 50% -250px, #1f2937, transparent),
        linear-gradient(180deg, #050509, var(--bg));
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 30px 28px 28px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
      backdrop-filter: blur(16px);
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #ddd6fe;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin: 0 0 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 15.5px;
      line-height: 1.65;
      margin-bottom: 26px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      width: 100%;
      padding: 17px;
      border-radius: 18px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent);
      box-shadow: 0 14px 36px rgba(124,58,237,0.45);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #e5e7eb;
      border: 1px solid var(--border);
    }

    .btn:active { transform: scale(0.97); }

    .status {
      margin-top: 20px;
      font-size: 14px;
      text-align: center;
      min-height: 22px;
    }

    .footer {
      margin-top: 26px;
      text-align: center;
      font-size: 12px;
      color: #71717a;
      letter-spacing: .02em;
    }
  </style></head>
<body>  <div class="container">
    <div class="card"><!-- LOGO -->
  <div class="logo">
    <img src="hero.png" alt="Creatify AI" />
  </div>

  <span class="badge">FREE AI TOOL</span>

  <h1>Creatify AI</h1>
  <p>
    Подпишись на Telegram‑канал про AI‑промпты и нейрофото,
    и получи бесплатный инструмент для работы с ИИ.
    Доступ открывается автоматически.
  </p>

  <div class="actions">
    <button class="btn btn-secondary" id="subscribeBtn">
      🔔 Подписаться на канал
    </button>

    <button class="btn btn-primary" id="checkBtn">
      ✅ Проверить подписку
    </button>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    © Creatify AI · Telegram channel @neyrolooms
  </div>
</div>

  </div>  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const statusEl = document.getElementById('status');
    const checkBtn = document.getElementById('checkBtn');
    const subBtn = document.getElementById('subscribeBtn');

    subBtn.onclick = () => {
      tg.openTelegramLink('https://t.me/neyrolooms');
    };

    checkBtn.onclick = async () => {
      statusEl.innerText = '⏳ Проверяем подписку…';

      const user = tg.initDataUnsafe?.user;
      if (!user) {
        statusEl.innerText = '❗ Открой Mini App через кнопку бота в Telegram';
        return;
      }

      try {
        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: user.id })
        });

        const data = await res.json();
        statusEl.innerText = data.message;

        if (data.ok && data.link) {
          setTimeout(() => tg.openLink(data.link), 1200);
        }
      } catch (e) {
        statusEl.innerText = '⚠️ Ошибка сервера';
      }
    };
  </script></body>
</html>
