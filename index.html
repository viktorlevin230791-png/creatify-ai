<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creatify AI — Free Tool</title>  <!-- Telegram Mini App API -->  <script src="https://telegram.org/js/telegram-web-app.js"></script>  <!-- Google Font -->  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">  <style>
    :root {
      --bg: #0b0c10;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: #9ca3af;
      --accent: linear-gradient(135deg, #7c3aed, #06b6d4);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(1200px 600px at 50% -200px, #1f2937, var(--bg));
      color: var(--text);
    }

    .container {
      padding: 24px;
      max-width: 420px;
      margin: 0 auto;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(124,58,237,0.15);
      color: #c4b5fd;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.2;
      margin: 0 0 12px;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .button {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: var(--accent);
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 10px 30px rgba(124,58,237,0.35);
    }

    .button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }
  </style></head>
<body>  <div class="container">
    <div class="hero">
      <span class="badge">🎁 FREE ACCESS</span>
      <h1>Creatify AI Tool</h1>
      <p>
        Получи бесплатный AI‑инструмент после подписки на наш канал.
        Доступ открывается автоматически.
      </p><button class="button" id="checkBtn">Проверить подписку</button>

  <div class="status" id="status"></div>
</div>

<div class="footer">
  © Creatify AI
</div>

  </div>  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const statusEl = document.getElementById('status');
    const btn = document.getElementById('checkBtn');

    btn.addEventListener('click', async () => {
      statusEl.innerText = '⏳ Проверяем подписку...';

      try {
        const user = tg.initDataUnsafe?.user;
        if (!user) {
          statusEl.innerText = '❌ Не удалось получить данные пользователя';
          return;
        }

        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: user.id })
        });

        const data = await res.json();

        statusEl.innerText = data.message;

        if (data.ok && data.link) {
          setTimeout(() => {
            tg.openLink(data.link);
          }, 1200);
        }

      } catch (e) {
        statusEl.innerText = '⚠️ Ошибка соединения';
      }
    });
  </script></body>
</html>
